services:
  test-db:
    image: postgres:17
    environment:
      POSTGRES_DB: magic_collecting_test
      POSTGRES_USER: magic_test
      POSTGRES_PASSWORD: magic_test
    ports:
      - "55432:5432"
    volumes:
      - test_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U magic_test -d magic_collecting_test"]
      interval: 5s
      timeout: 5s
      retries: 12
      start_period: 10s
  test-app:
    image: ${TEST_APP_IMAGE:-magic-the-collecting:test}
    build: .
    env_file: .env.test
    ports:
      - "18080:8080"
    volumes:
      - test_images:/app/data/raw-images
    depends_on:
      test-db:
        condition: service_healthy
volumes:
  test_pgdata:
  test_images:
