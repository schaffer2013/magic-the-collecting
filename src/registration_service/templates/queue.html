{% extends "base.html" %}
{% block title %}Queue · {{ collection.name }}{% endblock %}
{% block content %}
<h1>{{ collection.name }} queue</h1>
<nav class="actions">
  <a class="button-link" href="/ui/collections/{{ collection.collection_id }}/review/next?strategy=oldest">Review oldest</a>
  <a class="button-link" href="/ui/collections/{{ collection.collection_id }}/review/next?strategy=newest">Review newest</a>
  <a class="button-link" href="/ui/collections/{{ collection.collection_id }}/review/next?strategy=random">Review random</a>
</nav>
<div class="grid">
{% for card in cards %}
  <a class="card" href="/ui/unverified-cards/{{ card.unverified_card_id }}/review">
    <img src="{{ card.raw_image_url }}" alt="Captured card">
    <p>{{ card.expected_scryfall_id or "No expected ID" }}</p>
  </a>
{% endfor %}
</div>
{% endblock %}
