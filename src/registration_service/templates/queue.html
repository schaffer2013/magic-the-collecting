{% extends "base.html" %}
{% block title %}Queue · {{ collection.name }}{% endblock %}
{% block content %}
<h1>{{ collection.name }} queue</h1>
<div class="grid">
{% for card in cards %}
  <a class="card" href="/ui/unverified-cards/{{ card.unverified_card_id }}/review">
    <img src="{{ card.raw_image_url }}" alt="Captured card">
    <p>{{ card.expected_scryfall_id or "No expected ID" }}</p>
  </a>
{% endfor %}
</div>
{% endblock %}
